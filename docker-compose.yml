services:
  migrate:
    build:
      context: .
      target: migrator
      network: host
    environment:
      - DATABASE_URL=file:/data/funmarket.db
    volumes:
      - db-data:/data

  app:
    build:
      context: .
      target: runner
      network: host
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET}
      - DAILY_ALLOWANCE=${DAILY_ALLOWANCE:-1000}
      - DATABASE_URL=file:/data/funmarket.db
    volumes:
      - db-data:/data
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - app

volumes:
  db-data:
  caddy_data:
  caddy_config:
